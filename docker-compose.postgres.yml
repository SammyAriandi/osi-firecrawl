version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: optima-postgres
    environment:
      POSTGRES_USER: optima_user
      POSTGRES_PASSWORD: OptimaSmartin123!@#
      POSTGRES_DB: optima_erp
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - optima-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optima_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: optima-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@optima.local
      PGADMIN_DEFAULT_PASSWORD: AdminOptima123!@#
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      TZ: Asia/Jakarta
    ports:
      - "5050:80"
    networks:
      - optima-network
    depends_on:
      - postgres
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  optima-network:
    driver: bridge
