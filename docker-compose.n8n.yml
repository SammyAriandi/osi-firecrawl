version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: optima-n8n
    environment:
      # Basic Configuration
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      TZ: Asia/Jakarta
      
      # Database Configuration
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: optima-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: optima_erp
      DB_POSTGRESDB_USER: optima_user
      DB_POSTGRESDB_PASSWORD: OptimaSmartin123!@#
      DB_POSTGRESDB_SSL: 'false'
      
      # Webhook Configuration
      WEBHOOK_URL: http://localhost:5678/
      WEBHOOK_TUNNEL_URL: http://localhost:5678/
      N8N_SECURE_COOKIE: 'false'
      
      # Security Settings
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: Optima2024!@#
      
      # Locale & Timezone
      LC_ALL: id_ID.UTF-8
      LANG: id_ID.UTF-8
      
      # Performance Settings
      GENERIC_FUNCTION_TIMEOUT: 600  # 10 minutes
      FUNCTION_TIMEOUT: 600
      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: combined
      
      # Memory & Resource
      NODE_OPTIONS: '--max-old-space-size=2048'
      
      # Execution
      EXECUTIONS_TIMEOUT: 3600  # 1 hour timeout for long-running executions
      EXECUTIONS_TIMEOUT_MAX: 7200  # 2 hours absolute max
      
      # Queue
      QUEUE_BULL_REDIS_HOST: optima-redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_DB: 0
      
      # Optional: External webhook
      # WEBHOOK_TUNNEL_URL: https://your-domain.com/
      
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n_workflows:/workflows
      - ./n8n_plugins:/home/node/.n8n/custom
    depends_on:
      - optima-postgres
      - optima-redis
    networks:
      - optima-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for queue management
  optima-redis:
    image: redis:7-alpine
    container_name: optima-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - optima-network
    restart: always
    command: redis-server --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n8n_data:
    driver: local
  redis_data:
    driver: local

networks:
  optima-network:
    driver: bridge
    external: true
